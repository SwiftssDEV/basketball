<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><title>Баскетбол Эмодзи: Messenger Max</title><style>*{margin:0;padding:0;box-sizing:border-box;}body,html{width:100%;height:100%;overflow:hidden;background:#0b0c10;font-family:monospace;color:#fff;user-select:none;}#messenger{position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;z-index:10;}#sidebar{width:280px;background:#141722;border-right:2px solid #1f2330;padding:15px;display:flex;flex-direction:column;}.chat-item{background:#1f2330;padding:12px;margin-top:8px;border-radius:6px;font-weight:bold;color:#00ff66;border-left:4px solid #00ff66;}#main-chat{flex:1;display:flex;flex-direction:column;background:#0f111a;position:relative;}#chat-header{background:#141722;padding:15px;font-size:16px;font-weight:bold;border-bottom:2px solid #1f2330;display:flex;justify-content:space-between;align-items:center;}#game-container{flex:1;position:relative;background:#1a1d29;}canvas{display:block;width:100%;height:100%;background:radial-gradient(circle,#242936 0%,#13161c 100%);}#slowmo-alert{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(255,204,0,0.9);color:#000;padding:8px 20px;font-weight:bold;border-radius:20px;font-size:14px;display:none;box-shadow:0 0 15px #ffcc00;z-index:20;}</style></head><body><div id="messenger"><div id="sidebar"><h2 style="color:#fff;font-size:18px;border-bottom:1px solid #1f2330;padding-bottom:10px;">💬 MESSENGER MAX</h2><div class="chat-item">📟 БРО: МАКС (ИГРА)</div><div style="margin-top:auto;font-size:11px;color:#555;">Псевдоним: SWIFTS | v1.0</div></div><div id="main-chat"><div id="chat-header"><div>🏀 Баскетбол Эмодзи: Messenger Max</div><div style="color:#00ff66;">СЧЁТ: <span id="m-score">0</span></div></div><div id="game-container"><div id="slowmo-alert">⏳ МАТРИЦА СЛОУМО: КЛИКНИ НА СОЮЗНИКА ДЛЯ ПАСА!</div><canvas id="courtCanvas"></canvas></div></div></div><script>const canvas=document.getElementById('courtCanvas');const ctx=canvas.getContext('2d');let score=0;let isSlowMo=false;let gameRunning=true;let mx=200,my=200,isLMB=false;let ball={x:300,y:200,vx:0,vy:0,r:10,owner:null,type:"ball",targetX:0,targetY:0,flyTime:0};let players=[];let playerControlled=null;const ring={x:window.innerWidth-340,y:180,w:45,h:8,zoneX:window.innerWidth-600};function initGame(){canvas.width=canvas.parentElement.offsetWidth;canvas.height=canvas.parentElement.offsetHeight;ring.x=canvas.width-80;ring.y=canvas.height/2-60;ring.zoneX=canvas.width-320;players=[];for(let i=0;i<3;i++){players.push({id:i,team:"us",x:150+i*80,y:200+i*100,vx:0,vy:0,r:16,emoji:i===0?"🔥":"🟢"});}playerControlled=players[0];ball.owner=playerControlled;for(let i=0;i<3;i++){players.push({id:i+3,team:"them",x:canvas.width-250-i*60,y:150+i*120,vx:0,vy:0,r:16,emoji:"🔴"});}ball.x=playerControlled.x;ball.y=playerControlled.y;}window.addEventListener('resize',initGame);window.addEventListener('contextmenu',e=>{e.preventDefault();});canvas.addEventListener('mousemove',e=>{let r=canvas.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;});canvas.addEventListener('mousedown',e=>{if(!gameRunning)return;if(e.button===2){if(ball.owner&&ball.owner.team==="us"){isSlowMo=true;document.getElementById('slowmo-alert').style.display='block';}}if(e.button===0){if(isSlowMo){let hit=null;players.forEach(p=>{if(p.team==="us"&&p!==ball.owner){let d=Math.sqrt((mx-p.x)*(mx-p.x)+(my-p.y)*(my-p.y));if(d<40)hit=p;}});if(hit){ball.owner=null;ball.targetX=hit.x;ball.targetY=hit.y;ball.flyTime=20;ball.vx=(hit.x-ball.x)/20;ball.vy=(hit.y-ball.y)/20;playerControlled.emoji="🟢";playerControlled=hit;playerControlled.emoji="🔥";isSlowMo=false;document.getElementById('slowmo-alert').style.display='none';}}else{isLMB=true;if(ball.owner===playerControlled&&playerControlled.x>ring.zoneX){ball.owner=null;ball.targetX=ring.x;ball.targetY=ring.y;ball.flyTime=25;ball.vx=(ring.x-ball.x)/25;ball.vy=-5.5;}}}});canvas.addEventListener('mouseup',e=>{if(e.button===0)isLMB=false;});window.addEventListener('keydown',e=>{if(e.code==='Space'&&ball.owner&&ball.owner.team==="them"){let d=Math.sqrt((playerControlled.x-ball.owner.x)*(playerControlled.x-ball.owner.x)+(playerControlled.y-ball.owner.y)*(playerControlled.y-ball.owner.y));if(d<45){ball.owner=playerControlled;playerControlled.emoji="🔥";}}});function updatePhysics(){let dt=isSlowMo?0.18:1;if(!ball.owner||ball.owner!==playerControlled){let dx=mx-playerControlled.x;let dy=my-playerControlled.y;let d=Math.sqrt(dx*dx+dy*dy);if(d>5){playerControlled.vx=(dx/d)*3.8;playerControlled.vy=(dy/d)*3.8;}else{playerControlled.vx=playerControlled.vy=0;}}else if(isLMB&&ball.owner===playerControlled){let dx=mx-playerControlled.x;let dy=my-playerControlled.y;let d=Math.sqrt(dx*dx+dy*dy);if(d>5){playerControlled.vx=(dx/d)*3.8;playerControlled.vy=(dy/d)*3.8;}}else{playerControlled.vx=playerControlled.vy=0;}players.forEach(p=>{if(p===playerControlled){p.x+=p.vx*dt;p.y+=p.vy*dt;return;}if(ball.owner===p){if(p.team==="them"){let dx=ring.x-p.x;let dy=ring.y-p.y;let d=Math.sqrt(dx*dx+dy*dy);p.x+=(dx/d)*2.2*dt;p.y+=(dy/d)*2.2*dt;if(p.x>ring.zoneX-40){ball.owner=null;ball.targetX=ring.x;ball.targetY=ring.y;ball.flyTime=25;ball.vx=(ring.x-ball.x)/25;ball.vy=-4.5;}}}else{let target=ball.owner?ball.owner:ball;let dx=target.x-p.x;let dy=target.y-p.y;let d=Math.sqrt(dx*dx+dy*dy);if(d>15){p.x+=(dx/d)*(p.team==="them"?1.9:1.4)*dt;p.y+=(dy/d)*(p.team==="them"?1.9:1.4)*dt;}if(p.team==="them"&&d<25&&ball.owner&&ball.owner.team==="us"){ball.owner.emoji="🟢";ball.owner=p;}}if(p.x<20)p.x=20;if(p.x>canvas.width-20)p.x=canvas.width-20;if(p.y<20)p.y=20;if(p.y>canvas.height-20)p.y=canvas.height-20;});if(ball.owner){ball.x=ball.owner.x;ball.y=ball.owner.y-14;ball.vx=ball.vy=0;}else{ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;if(!isSlowMo)ball.vy+=0.22;ball.flyTime-=dt;if(ball.x<10){ball.x=10;ball.vx*=-0.6;}if(ball.x>canvas.width-10){ball.x=canvas.width-10;ball.vx*=-0.6;}if(ball.y<10){ball.y=10;ball.vy*=-0.6;}if(ball.y>canvas.height-10){ball.y=canvas.height-10;ball.vy*=-0.6;}if(ball.flyTime<=0){let hitRing=Math.sqrt((ball.x-ring.x)*(ball.x-ring.x)+(ball.y-ring.y)*(ball.y-ring.y));if(hitRing<28){score+=2;document.getElementById('m-score').innerText=score;ball.vy=4;ball.vx=-1.5;}let closePlayer=null;let minDist=9999;players.forEach(p=>{let d=Math.sqrt((ball.x-p.x)*(ball.x-p.x)+(ball.y-p.y)*(ball.y-p.y));if(d<minDist){minDist=d;closePlayer=p;}});if(minDist<35){ball.owner=closePlayer;if(closePlayer.team==="us")closePlayer.emoji="🔥";}}}}function render(){ctx.clearRect(0,0,canvas.width,canvas.height);updatePhysics();ctx.strokeStyle="rgba(255,255,255,0.08)";ctx.lineWidth=4;ctx.strokeRect(20,20,canvas.width-40,canvas.height-40);ctx.beginPath();ctx.arc(20,canvas.height/2,100,0,Math.PI*2);ctx.stroke();ctx.fillStyle="rgba(255,102,0,0.06)";ctx.fillRect(ring.zoneX,20,canvas.width-ring.zoneX-20,canvas.height-40);ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="10px monospace";ctx.fillText("ЗОНА БРОСКА",ring.zoneX+10,40);ctx.strokeStyle="red";ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(ring.x-15,ring.y);ctx.lineTo(ring.x+15,ring.y);ctx.stroke();ctx.fillStyle="rgba(255,0,0,0.2)";ctx.fillRect(ring.x-12,ring.y,24,20);players.forEach(p=>{ctx.fillStyle=p.team==="us"?"#00ff66":"#ff3333";ctx.font="24px Arial";ctx.fillText(p.emoji,p.x-12,p.y+8);});if(!ball.owner){ctx.fillStyle="#ff6600";ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fff";ctx.stroke();}requestAnimationFrame(render);}initGame();render();</script></body></html>
